name: Build and Deploy Jekyll Site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        run: bundle exec jekyll build --source . --destination _site --baseurl "${{ steps.pages.outputs.base_path }}"

      # --- 修复后的处理步骤 ---
      - name: Post-process Assets
        run: |
          # 1. 删除所有 Source Map 文件
          find _site -name "*.map" -type f -delete
          
          # 2. 清理 CSS 注释 (修复了 sed 语法)
          find _site -name "*.css" -exec sed -i 's/\/\*.*\*\///g' {} +
          
          # 3. 移除 HTML 中的注释 (使用更安全的正则)
          # 注意：这里只删除 格式的注释
          find _site -name "*.html" -exec sed -i 's///g' {} +
          
          echo "Assets processed successfully."

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
