# .github/workflows/jekyll.yml

name: Build and Deploy Jekyll Site to Pages

on:
  # 在推送到 `main` 分支时运行
  push:
    branches: ["main"]
  # 允许你手动从 Actions 标签页运行这个工作流
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限，允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个并发部署，跳过排队中的旧任务
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 构建任务
  build:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 服务器
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 检出你的仓库代码

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1' # 可以指定 Ruby 版本
          bundler-cache: true # 缓存 Gem，加快后续构建速度

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        run: bundle exec jekyll build --source . --destination _site --baseurl "${{ steps.pages.outputs.base_path }}"

      # --- 插入：混淆与处理步骤 ---
      - name: Post-process Assets (Minify & Obfuscate)
        run: |
          # 1. 删除所有 Source Map 文件 (防止 F12 还原源码)
          find _site -name "*.map" -type f -delete
          
          # 2. 简单的 CSS/JS 混淆
          find _site -name "*.css" -exec sed -i 's/\/\*.*\*\///g' {} +
          
          # 3. 移除 HTML 中的注释 (保护你的私有备注)
          find _site -name "*.html" -exec sed -i 's///g' {} +
          
          echo "Assets obfuscated and maps removed."

      # --------------------------

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

      - name: Upload artifact
        # 将构建好的 `_site` 文件夹作为产物上传
        uses: actions/upload-pages-artifact@v3

  # 部署任务
  deploy:
    needs: build # 部署任务依赖于构建任务
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }} # 输出最终的网站 URL
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # 将产物部署到 Pages
