<!-- _includes/game.html -->
<!-- Econometrics Snake — 计量经济学贪吃蛇 (HiDPI) -->
<section id="fun-zone" class="content-section" style="text-align: center; margin-top: 4rem;">
  <h2 class="section-title" style="font-size: 1.35rem;">
    🐍 <span id="g-title"></span>
  </h2>
  <p id="g-hint" style="font-size: 0.88rem; color: var(--tertiary-color, #6b7280); margin-bottom: 0.75rem; line-height: 1.6;"></p>

  <div style="position: relative; display: inline-block; max-width: 100%;">
    <canvas id="snakeCanvas"
      style="display: block; border: 2px solid var(--border-color-strong, #d1d5db); border-radius: 8px; background: #fdfdfd; max-width: 100%; touch-action: none; width: 520px; height: 520px;">
    </canvas>
    <div id="g-overlay" style="position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(253,253,253,0.94); border-radius: 8px;">
      <div id="g-oi" style="font-size: 2.8rem; margin-bottom: 0.3rem;">🐍</div>
      <div id="g-om" style="font-size: 1.2rem; font-weight: 700; color: #111827; margin-bottom: 0.25rem;"></div>
      <div id="g-os" style="font-size: 0.85rem; color: #6b7280; max-width: 85%; line-height: 1.5;"></div>
    </div>
  </div>

  <div style="display: flex; justify-content: space-between; align-items: center; max-width: 520px; margin: 0.5rem auto 0; font-size: 0.92rem; color: var(--secondary-color, #374151);">
    <span><span id="g-sl"></span> <b id="g-sc" style="color: var(--accent-color, #1e40af);">0</b></span>
    <span id="g-eaten" style="font-size: 0.85rem; color: var(--tertiary-color, #6b7280);"></span>
    <span><span id="g-bl"></span> <b id="g-bs" style="color: #b91c1c;">0</b></span>
  </div>
</section>

<script>
(function() {
  'use strict';

  const lang = document.documentElement.lang || 'zh';
  const E = lang === 'en';
  const T = {
    title:  E ? 'Econometrics Snake' : '计量经济学贪吃蛇',
    hint:   E ? 'Arrow keys / WASD / Swipe — Eat ✅ good methods, avoid ❌ bad ones! Walls wrap around.'
              : '方向键 / WASD / 滑动  —  吃 ✅ 好方法，躲 ❌ 坏问题！撞墙会穿越到对面',
    score:  E ? 'Score:' : '得分:',
    best:   E ? 'Best:' : '最高:',
    start:  E ? 'Press arrow key or tap to start' : '按方向键或点击开始',
    over:   E ? 'Research Terminated!' : '研究终结！',
    retry:  E ? 'Press key or tap to retry' : '按键或点击重试',
    ate:    E ? 'Got' : '获得',
    hitBad: E ? 'Hit' : '撞上',
    hitSelf:E ? 'Bit own tail!' : '咬到自己了！',
    hitWall:E ? 'Hit wall!' : '撞墙了！',
  };

  document.getElementById('g-title').textContent = T.title;
  document.getElementById('g-hint').textContent = T.hint;
  document.getElementById('g-sl').textContent = T.score;
  document.getElementById('g-bl').textContent = T.best;

  // ==================== Items ====================
  const GOOD = [
    { code: 'IV',   full: E?'Instrument Var':'工具变量',   color: '#15803d', bg: '#dcfce7' },
    { code: 'RCT',  full: E?'Randomized Exp':'随机实验',   color: '#0369a1', bg: '#dbeafe' },
    { code: 'DID',  full: E?'Diff-in-Diff':'双重差分',     color: '#4338ca', bg: '#e0e7ff' },
    { code: 'RDD',  full: E?'Reg. Discont.':'断点回归',    color: '#0e7490', bg: '#cffafe' },
    { code: 'PSM',  full: E?'Prop. Match':'倾向匹配',      color: '#166534', bg: '#dcfce7' },
    { code: 'FE',   full: E?'Fixed Effects':'固定效应',     color: '#1d4ed8', bg: '#dbeafe' },
    { code: 'GMM',  full: E?'Gen. Moments':'广义矩估计',   color: '#6d28d9', bg: '#ede9fe' },
    { code: 'ML',   full: E?'Max Likelihood':'极大似然',    color: '#0f766e', bg: '#ccfbf1' },
    { code: '2SLS', full: E?'Two-Stage LS':'两阶段LS',     color: '#1e40af', bg: '#dbeafe' },
    { code: 'SC',   full: E?'Synth Control':'合成控制',     color: '#7c3aed', bg: '#ede9fe' },
  ];

  const BAD = [
    { code: 'OVB',  full: E?'Omitted Var':'遗漏变量',      color: '#b91c1c', bg: '#fee2e2' },
    { code: 'Endo', full: E?'Endogeneity':'内生性',         color: '#9f1239', bg: '#ffe4e6' },
    { code: 'p>.05',full: E?'Insignificant':'不显著',       color: '#dc2626', bg: '#fee2e2' },
    { code: 'Multi',full: E?'Multicol.':'共线性',           color: '#b45309', bg: '#fef3c7' },
    { code: 'Hetero',full:E?'Heterosked.':'异方差',         color: '#92400e', bg: '#fef9c3' },
    { code: 'Spur.', full:E?'Spurious Reg':'伪回归',       color: '#991b1b', bg: '#fee2e2' },
  ];

  // ==================== HiDPI Canvas Setup ====================
  const canvas = document.getElementById('snakeCanvas');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const CSS_W = 520, CSS_H = 520;

  // Set actual canvas buffer size to match physical pixels
  canvas.width = CSS_W * dpr;
  canvas.height = CSS_H * dpr;
  canvas.style.width = CSS_W + 'px';
  canvas.style.height = CSS_H + 'px';
  ctx.scale(dpr, dpr);  // Scale all drawing ops so we work in CSS pixels

  const COLS = 13, ROWS = 13;
  const CELL = CSS_W / COLS; // ~40 CSS pixels per cell

  // Use system UI font — crisp native rendering, no bold
  const FONT_LABEL = '500 15px -apple-system, "Segoe UI", "Noto Sans SC", sans-serif';
  const FONT_BADGE = '600 11px -apple-system, "Segoe UI", sans-serif';
  const FONT_TOOLTIP = '500 14px -apple-system, "Segoe UI", "Noto Sans SC", sans-serif';

  const scoreEl = document.getElementById('g-sc');
  const bestEl = document.getElementById('g-bs');
  const eatenEl = document.getElementById('g-eaten');
  const ov = document.getElementById('g-overlay');
  const oI = document.getElementById('g-oi');
  const oM = document.getElementById('g-om');
  const oS = document.getElementById('g-os');

  // ==================== State ====================
  let state = 'idle';
  let snake, dir, nextDir, score, bestScore, tickRate, tickTimer;
  let items, particles, lastEaten, lastTime;

  bestScore = parseInt(localStorage.getItem('econSnake3') || '0', 10);
  bestEl.textContent = bestScore;

  // roundRect polyfill
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
      if(typeof r==='number') r=[r,r,r,r];
      this.moveTo(x+r[0],y);
      this.lineTo(x+w-r[1],y); this.quadraticCurveTo(x+w,y,x+w,y+r[1]);
      this.lineTo(x+w,y+h-r[2]); this.quadraticCurveTo(x+w,y+h,x+w-r[2],y+h);
      this.lineTo(x+r[3],y+h); this.quadraticCurveTo(x,y+h,x,y+h-r[3]);
      this.lineTo(x,y+r[0]); this.quadraticCurveTo(x,y,x+r[0],y);
    };
  }

  // ==================== Helpers ====================
  function showOL(i,m,s) { ov.style.display='flex'; oI.textContent=i; oM.textContent=m; oS.textContent=s; }
  function hideOL() { ov.style.display='none'; }
  function rnd(n) { return Math.floor(Math.random()*n); }

  function cellFree(x,y) {
    for(const s of snake) if(s.x===x && s.y===y) return false;
    for(const it of items) if(it.x===x && it.y===y) return false;
    return true;
  }
  function randFree() {
    let t=0;
    while(t<300) { const x=rnd(COLS),y=rnd(ROWS); if(cellFree(x,y)) return {x,y}; t++; }
    return {x:rnd(COLS),y:rnd(ROWS)};
  }
  function spawnGood() { const d=GOOD[rnd(GOOD.length)], p=randFree(); items.push({x:p.x,y:p.y,good:true,def:d,age:0}); }
  function spawnBad() { const d=BAD[rnd(BAD.length)], p=randFree(); items.push({x:p.x,y:p.y,good:false,def:d,age:0}); }
  function ensureItems() {
    while(items.filter(i=>i.good).length<2) spawnGood();
    while(items.filter(i=>!i.good).length<1) spawnBad();
    while(items.length<4) { Math.random()<0.65 ? spawnGood() : spawnBad(); }
  }
  function spawnParts(px,py,col,n) {
    for(let i=0;i<n;i++) particles.push({
      x:px, y:py, dx:(Math.random()-0.5)*4, dy:(Math.random()-0.5)*4,
      life:15+Math.random()*12, color:col, size:3+Math.random()*3
    });
  }

  // ==================== Drawing ====================
  function drawGrid() {
    ctx.strokeStyle = '#f0f0f0';
    ctx.lineWidth = 0.5;
    for(let i=0;i<=COLS;i++) { ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,CSS_H); ctx.stroke(); }
    for(let i=0;i<=ROWS;i++) { ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(CSS_W,i*CELL); ctx.stroke(); }
  }

  function drawSnake() {
    snake.forEach((seg,i) => {
      const px=seg.x*CELL, py=seg.y*CELL;
      if(i===0) {
        // Head
        ctx.fillStyle='#1e3a8a';
        ctx.beginPath(); ctx.roundRect(px+2,py+2,CELL-4,CELL-4,8); ctx.fill();
        // Face
        ctx.fillStyle='#fbbf24';
        ctx.beginPath(); ctx.arc(px+CELL/2, py+CELL/2+2, CELL*0.27, 0, Math.PI*2); ctx.fill();
        // Glasses
        ctx.strokeStyle='#1e293b'; ctx.lineWidth=1.5;
        const gY=py+CELL/2+1, gR=CELL*0.1;
        ctx.beginPath(); ctx.arc(px+CELL/2-gR*1.6, gY, gR+0.5, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.arc(px+CELL/2+gR*1.6, gY, gR+0.5, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(px+CELL/2-gR*0.5,gY); ctx.lineTo(px+CELL/2+gR*0.5,gY); ctx.stroke();
        // Cap
        ctx.fillStyle='#1e293b';
        const capY=py+CELL/2-CELL*0.17;
        ctx.beginPath();
        ctx.moveTo(px+CELL*0.15,capY); ctx.lineTo(px+CELL*0.85,capY); ctx.lineTo(px+CELL/2,capY-CELL*0.2);
        ctx.closePath(); ctx.fill();
      } else {
        const t=Math.min(i/Math.max(snake.length,1),1);
        ctx.fillStyle=`rgb(${Math.round(30+t*140)},${Math.round(58+t*145)},${Math.round(138+t*85)})`;
        ctx.beginPath(); ctx.roundRect(px+3,py+3,CELL-6,CELL-6,6); ctx.fill();
      }
    });
  }

  function drawItems() {
    items.forEach(it => {
      const px=it.x*CELL, py=it.y*CELL, d=it.def;
      it.age++;
      const m=3;

      // Card
      ctx.fillStyle=d.bg; ctx.strokeStyle=d.color; ctx.lineWidth=it.good?1.5:2;
      ctx.beginPath(); ctx.roundRect(px+m,py+m,CELL-m*2,CELL-m*2,6); ctx.fill(); ctx.stroke();

      // Bad glow
      if(!it.good && Math.sin(it.age*0.08)>0.2) {
        ctx.strokeStyle='rgba(185,28,28,0.2)'; ctx.lineWidth=3.5;
        ctx.beginPath(); ctx.roundRect(px+m-2,py+m-2,CELL-m*2+4,CELL-m*2+4,8); ctx.stroke();
      }

      // Badge circle
      const bx=px+m+9, by=py+m+9;
      ctx.fillStyle = it.good ? '#16a34a' : '#dc2626';
      ctx.beginPath(); ctx.arc(bx,by,7,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#fff';
      ctx.font = FONT_BADGE;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(it.good?'✓':'✗', bx, by);

      // Code label — medium weight, system font, NOT bold
      ctx.fillStyle = d.color;
      ctx.font = FONT_LABEL;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(d.code, px+CELL/2, py+CELL/2+4);
    });
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.globalAlpha=Math.max(0,p.life/25);
      ctx.fillStyle=p.color;
      ctx.fillRect(p.x,p.y,p.size,p.size);
    });
    ctx.globalAlpha=1;
  }

  function drawTooltip() {
    if(!lastEaten||lastEaten.timer<=0) { lastEaten=null; return; }
    const a=Math.min(1,lastEaten.timer/20), yOff=(1-a)*8;
    ctx.globalAlpha=a;
    ctx.font = FONT_TOOLTIP;
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillStyle = lastEaten.good ? '#15803d' : '#b91c1c';
    const pre = lastEaten.good ? '✅  ' : '❌  ';
    const suf = lastEaten.good ? '  +10' : '';
    ctx.fillText(pre+lastEaten.def.code+' — '+lastEaten.def.full+suf, CSS_W/2, 10+yOff);
    ctx.globalAlpha=1;
    lastEaten.timer--;
  }

  // ==================== Logic ====================
  let inputQueue = []; // Buffer multiple direction inputs between ticks

  function reset() {
    state='running'; score=0; tickRate=180; tickTimer=0; // slower start: 180ms
    snake=[{x:6,y:6},{x:5,y:6},{x:4,y:6}];
    dir={x:1,y:0}; nextDir={x:1,y:0};
    inputQueue = [];
    items=[]; particles=[]; lastEaten=null;
    for(let i=0;i<3;i++) spawnGood();
    for(let i=0;i<2;i++) spawnBad();
    scoreEl.textContent='0'; eatenEl.textContent='';
    hideOL(); lastTime=performance.now();
    requestAnimationFrame(loop);
  }

  let deathLock = false; // prevent accidental instant restart

  function die(reason) {
    state='over';
    deathLock = true;
    const h=snake[0];
    spawnParts(h.x*CELL+CELL/2, h.y*CELL+CELL/2, '#b91c1c', 14);
    if(score>bestScore) { bestScore=score; localStorage.setItem('econSnake3',bestScore); bestEl.textContent=bestScore; }
    setTimeout(()=>{
      showOL('😭',T.over, reason+'\n'+T.retry+' ('+T.score+' '+score+')');
      // Unlock input after overlay is shown + a short extra delay
      setTimeout(()=>{ deathLock = false; }, 400);
    }, 300);
  }

  function tick() {
    // Process input queue: apply next buffered direction
    if (inputQueue.length > 0) {
      const next = inputQueue.shift();
      // Only apply if it's not a 180-degree reversal
      if (!(dir.x === -next.x && dir.y === -next.y)) {
        dir = next;
      }
    }

    const h=snake[0];
    let nx=h.x+dir.x, ny=h.y+dir.y;

    // Wall wrapping — go through wall, come out the other side
    if (nx < 0) nx = COLS - 1;
    else if (nx >= COLS) nx = 0;
    if (ny < 0) ny = ROWS - 1;
    else if (ny >= ROWS) ny = 0;

    // Self collision
    for(let i=1;i<snake.length;i++) if(snake[i].x===nx&&snake[i].y===ny) { die(T.hitSelf); return; }

    let ate=null;
    for(let i=items.length-1;i>=0;i--) { if(items[i].x===nx&&items[i].y===ny) { ate=items.splice(i,1)[0]; break; } }

    snake.unshift({x:nx,y:ny});

    if(ate) {
      if(ate.good) {
        score+=10; scoreEl.textContent=score;
        spawnParts(nx*CELL+CELL/2,ny*CELL+CELL/2,ate.def.color,8);
        lastEaten={def:ate.def,good:true,timer:70};
        eatenEl.textContent=T.ate+' '+ate.def.code;
        tickRate=Math.max(100,tickRate-1.5); // gentler speed ramp, higher floor
      } else {
        lastEaten={def:ate.def,good:false,timer:70};
        spawnParts(nx*CELL+CELL/2,ny*CELL+CELL/2,'#b91c1c',12);
        die(T.hitBad+' '+ate.def.code+'('+ate.def.full+')');
        return;
      }
    } else { snake.pop(); }

    ensureItems();
    while(items.length>7) items.shift();
  }

  function loop(now) {
    if(state!=='running') { draw(); if(particles.length>0) requestAnimationFrame(loop); return; }
    const dt=now-lastTime; lastTime=now; tickTimer+=dt;
    if(tickTimer>=tickRate) { tickTimer-=tickRate; tick(); }
    for(let i=particles.length-1;i>=0;i--) { const p=particles[i]; p.x+=p.dx; p.y+=p.dy; p.life--; if(p.life<=0) particles.splice(i,1); }
    draw();
    requestAnimationFrame(loop);
  }

  function draw() {
    ctx.clearRect(0,0,CSS_W,CSS_H);
    drawGrid(); drawItems(); drawSnake(); drawParticles(); drawTooltip();
  }

  // ==================== Input ====================
  function setDir(dx,dy) {
    // Use the last queued direction (or current dir) for reversal check
    const last = inputQueue.length > 0 ? inputQueue[inputQueue.length-1] : dir;
    if (last.x === -dx && last.y === -dy) return; // no 180
    if (last.x === dx && last.y === dy) return; // same direction, skip
    if (inputQueue.length < 3) inputQueue.push({x:dx, y:dy}); // buffer up to 3
  }

  document.addEventListener('keydown', e => {
    const keys=['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','Space'];
    if(state!=='running') { if(!deathLock && keys.includes(e.code)){e.preventDefault();reset();} return; }
    switch(e.code) {
      case 'ArrowUp':case 'KeyW': e.preventDefault();setDir(0,-1);break;
      case 'ArrowDown':case 'KeyS': e.preventDefault();setDir(0,1);break;
      case 'ArrowLeft':case 'KeyA': e.preventDefault();setDir(-1,0);break;
      case 'ArrowRight':case 'KeyD': e.preventDefault();setDir(1,0);break;
    }
  });

  let tx0=0,ty0=0;
  canvas.addEventListener('touchstart',e=>{
    e.preventDefault(); if(state!=='running'){if(!deathLock) reset(); return;}
    tx0=e.touches[0].clientX; ty0=e.touches[0].clientY;
  },{passive:false});
  canvas.addEventListener('touchend',e=>{
    e.preventDefault(); if(state!=='running') return;
    const dx=e.changedTouches[0].clientX-tx0,dy=e.changedTouches[0].clientY-ty0;
    if(Math.abs(dx)<10&&Math.abs(dy)<10) return;
    Math.abs(dx)>Math.abs(dy)?setDir(dx>0?1:-1,0):setDir(0,dy>0?1:-1);
  },{passive:false});
  canvas.addEventListener('mousedown',()=>{if(state!=='running' && !deathLock) reset();});

  // ==================== Init ====================
  snake=[{x:6,y:6},{x:5,y:6},{x:4,y:6}];
  dir={x:1,y:0}; nextDir={x:1,y:0};
  items=[]; particles=[];
  for(let i=0;i<3;i++) spawnGood();
  for(let i=0;i<2;i++) spawnBad();
  draw();
  showOL('🐍', T.title, T.start);
})();
</script>
