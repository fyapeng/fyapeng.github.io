<script>
document.addEventListener('DOMContentLoaded', function() {
    // 1. 平滑滚动
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function (e) {
            e.preventDefault();
            const targetId = this.getAttribute('href');
            const targetElement = document.querySelector(targetId);
            if (targetElement) {
                targetElement.scrollIntoView({ behavior: 'smooth' });
            }
        });
    });

    // 2. 邮箱保护
    const emailPlaceholder = document.getElementById('email-placeholder');
    if (emailPlaceholder) {
        const user = "{{ site.email | split: '@' | first }}";
        const domain = "{{ site.email | split: '@' | last }}";
        const email = user + "@" + domain;
        emailPlaceholder.innerHTML = `<a href="mailto:${email}">${email}</a>`;
    }

    // 3. 自动处理论文区域的链接：新窗口打开
    document.querySelectorAll('.paper-entry a').forEach(function(link) {
        const href = link.getAttribute('href');
        // 排除掉“javascript”开头的脚本链接（也就是摘要开关）
        if (href && !href.startsWith('javascript') && !href.startsWith('#')) {
            link.setAttribute('target', '_blank');
            link.setAttribute('rel', 'noopener noreferrer');
        }
    });
});

// 4. 论文摘要切换函数
function toggleAbs(btn) {
    // 找到按钮父节点后的下一个兄弟节点 (即 .abs-content)
    var content = btn.parentElement.nextElementSibling;
    
    if (content && content.classList.contains('abs-content')) {
        const isHidden = content.style.display === "none";
        content.style.display = isHidden ? "block" : "none";
        
        // 获取当前 HTML 语言设置
        const isEn = document.documentElement.lang === 'en';
        
        if (isHidden) {
            // 展开时
            btn.innerHTML = isEn ? "Close" : "收起摘要";
        } else {
            // 折叠恢复时
            btn.innerHTML = isEn ? "Abstract" : "摘要";
        }
    }
}

// 5. 动态隐藏简历CV地址
document.addEventListener("DOMContentLoaded", function() {
    // 1. 读取 profile.json，加时间戳防止缓存
    fetch('/profile.json?t=' + new Date().getTime()) 
        .then(response => response.json())
        .then(data => {
            // 获取所有带有 'cv-dynamic-link' 类的标签 (不管在哪个页面、有多少个)
            const cvLinks = document.querySelectorAll('.cv-dynamic-link');
            
            // 2. 自动判断语言 (如果网址里包含 /en/，就是英文版，否则是中文版)
            const isEnglish = window.location.pathname.includes('/en/');
            const cvPath = isEnglish ? data.cv_en : data.cv_zh;
            
            // 拼接带版本号的链接 (防PDF缓存)
            const finalLink = cvPath + "?v=" + data.version;

            // 3. 批量替换 href，并强制设置在新标签页打开
            cvLinks.forEach(link => {
                link.href = finalLink;
                link.setAttribute('target', '_blank'); // 确保点击后在新标签页预览/下载，不覆盖当前网页
            });
            
            console.log(isEnglish ? "CV loaded (English):" : "简历已加载 (中文):", finalLink);
        })
        .catch(error => console.error('简历加载失败:', error));
});
    
</script>
