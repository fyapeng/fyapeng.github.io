  description: |
    My research interests lie at the intersection of **microeconomic theory and public policy**, with a primary focus on policy evaluation and institutional design within **health economics**. I utilize micro-econometric methods to investigate behavioral responses in medical insurance markets, providing empirical evidence for optimizing healthcare cost-control policies. My current work examines DRG/DIP reform, moral hazard, supplier-induced demand, and physician behavior.

    In terms of methodology, I am actively exploring **Structural Estimation** to recover underlying preference and cost parameters for rigorous policy counterfactual simulations. I am also fascinated by **Agent-based Modeling (ABM)** to explore emergent macro effects of policy interventions within complex systems. I rely on **Python** and **Julia** for large-scale numerical optimization and simulation.

research_highlights:
  title: "Rcent Research"
  description: ""
  items:
    - title: "Cost-Containment Effects of DIP Reform"
      image: "assets/img/res1.png"
      description: "Overall, the DIP (Diagnosis-Intervention Packet) reform reduced medical costs by only 2.3%. Our study reveals that if hospitals' strategic adjustments (i.e., the sharp increase in surgery rates) were eliminated, the policy's cost-containment effect would reach 36%. Although effect sizes vary across diseases, the underlying pattern is consistent: the reduction in demand-side moral hazard is substituted by a rise in supplier-induced demand. This implies a critical policy paradox: stricter supply-side constraints may have consolidated the providers' dominance in clinical decision-making."
      
    - title: "Heterogeneity in DRG/DIP Reform"
      image: "assets/img/res2.png"
      description: "Using the Bunching-DID approach, we observe that the effectiveness of DRG (Diagnosis Related Groups) and DIP (Diagnosis-Intervention Packet) in curbing total medical costs is limited. This is mainly because the reforms led to a sharp rise in expenses for patients below the deductible (to the left), which offsets the savings observed in other cohorts. Additionally, DRG/DIP tends to increase patients' personal financial burden, specifically causing a significant rise in out-of-pocket expenses for those just above the deductible (to the right). Conversely, the reforms showed no significant impact on patients outside these specific policy intervals."


