about:
  title: "About Me"
  intro: |
    I am **Easton Ya-Peng Fu (付亚鹏)**, a Ph.D. student in Economics at the School of Economics, University of Chinese Academy of Social Sciences (UCASS).

    My research interests lie at the intersection of **microeconomic theory and public policy**, with a primary focus on policy evaluation and institutional design within **health economics**. I utilize micro-econometric methods to investigate behavioral responses in medical insurance markets, providing empirical evidence for optimizing healthcare cost-control policies. My current work examines DRG/DIP reform, moral hazard, supplier-induced demand, and physician behavior.

    I expect to receive my Ph.D. in 2029. You can find more details in my [CV_LINK]. I am always open to academic discussions and potential collaborations—please feel free to reach out via email or WeChat.

    Additionally, I share my academic notes and insights on my WeChat official account: **Shen Chun (申椿)** (ID: E-SChun).
    
